<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hang Nguyen — Data Analyst</title>
<meta name="description" content="Portfolio of Nguyen Ngoc Thanh Hang — Data Analyst working across Mobile Gaming, BI, and Behavioral Analytics.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:        #F4F8FB;
    --paper-warm:   #FAFBFD;
    --card:         #FFFFFF;
    --ink:          #0B1220;
    --ink-soft:     #475569;
    --ink-faint:    #94A3B8;
    --rule:         #DBE3EE;
    --rule-soft:    #E8EEF5;
    --accent:       #1E40AF;
    --accent-bright:#3B82F6;
    --accent-warm:  #0E7490;
    --teal:         #14B8A6;
    --teal-pale:    #CFFAFE;
    --amber:        #D97706;
    --amber-pale:   #FEF3C7;
    --rose:         #BE185D;
    --rose-pale:    #FCE7F3;
    --green:        #047857;
    --green-pale:   #D1FAE5;
    --indigo:       #4338CA;
    --indigo-pale:  #E0E7FF;
    --shadow-sm:    0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
    --shadow:       0 4px 16px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
    --shadow-lg:    0 12px 32px rgba(15, 23, 42, 0.10), 0 4px 12px rgba(15, 23, 42, 0.06);
    --radius:       12px;
    --radius-lg:    20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .display { font-family: 'Fraunces', Georgia, serif; font-weight: 600; letter-spacing: -0.02em; line-height: 1.05; }
  .display-italic { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 500; letter-spacing: -0.015em; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }
  .micro { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); }
  .micro-accent { color: var(--accent); }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  .container { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .container { padding: 0 20px; } }

  section { padding: 88px 0; border-bottom: 1px solid var(--rule-soft); position: relative; }
  @media (max-width: 720px) { section { padding: 56px 0; } }

  .section-head {
    display: flex; align-items: baseline; gap: 16px; margin-bottom: 48px;
    padding-bottom: 16px; border-bottom: 1px solid var(--rule);
  }
  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--accent); letter-spacing: 0.1em;
    font-weight: 500;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 32px; font-weight: 600; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .section-title em { font-style: italic; color: var(--accent); }
  .section-rule { flex: 1; height: 1px; background: linear-gradient(to right, var(--rule), transparent); }

  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(244, 248, 251, 0.85);
    backdrop-filter: saturate(1.4) blur(10px);
    -webkit-backdrop-filter: saturate(1.4) blur(10px);
    border-bottom: 1px solid var(--rule-soft);
  }
  .nav-inner {
    max-width: 1180px; margin: 0 auto; padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .nav-logo {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px;
    letter-spacing: -0.01em; color: var(--ink);
  }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 4px; align-items: center; }
  .nav-link {
    padding: 8px 14px; font-size: 14px; color: var(--ink-soft); border-radius: 8px;
    transition: all 180ms ease;
  }
  .nav-link:hover { color: var(--ink); background: rgba(30, 64, 175, 0.06); }
  .nav-actions { display: flex; gap: 10px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--rule);
    background: var(--card); display: grid; place-items: center;
    color: var(--ink-soft); transition: all 180ms ease;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .resume-btn {
    padding: 9px 18px; border-radius: 8px;
    background: var(--accent); color: white; font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 180ms ease;
  }
  .resume-btn:hover { background: var(--ink); transform: translateY(-1px); box-shadow: var(--shadow); }

  .lang-toggle {
    display: inline-flex; align-items: center;
    background: var(--card); border: 1px solid var(--rule);
    border-radius: 999px; padding: 3px; gap: 0;
    transition: border-color 180ms ease;
  }
  .lang-toggle:hover { border-color: var(--accent); }
  .lang-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em;
    padding: 5px 11px; border-radius: 999px;
    color: var(--ink-faint); transition: all 180ms ease;
    cursor: pointer;
  }
  .lang-btn.active {
    background: var(--accent); color: white;
  }
  .lang-btn:not(.active):hover { color: var(--ink); }

  @media (max-width: 880px) {
    .nav-links { display: none; }
  }

  .hero {
    padding: 64px 0 96px; border-bottom: 1px solid var(--rule-soft);
    position: relative; overflow: hidden;
  }
  .hero-grid {
    display: grid; grid-template-columns: 1.05fr 1fr; gap: 72px; align-items: center;
  }
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; gap: 48px; }
    .hero { padding: 48px 0 64px; }
  }
  .hero-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent);
    display: inline-flex; align-items: center; gap: 12px; margin-bottom: 28px;
  }
  .hero-tag::before { content: ''; width: 32px; height: 1px; background: var(--accent); }
  .hero-title {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: clamp(40px, 6.5vw, 78px); letter-spacing: -0.03em;
    line-height: 1.0; color: var(--ink); margin-bottom: 20px;
  }
  .hero-title em {
    font-style: italic; font-weight: 500;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-desc {
    font-size: 17px; color: var(--ink-soft); max-width: 520px;
    line-height: 1.65; margin-bottom: 40px;
  }
  .hero-ctas { display: flex; gap: 14px; margin-bottom: 56px; flex-wrap: wrap; }
  .btn-primary, .btn-secondary {
    padding: 14px 26px; border-radius: 10px; font-size: 15px; font-weight: 500;
    transition: all 200ms ease; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--ink); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .btn-secondary { background: var(--card); color: var(--ink); border: 1px solid var(--rule); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

  .hero-stats { display: flex; gap: 48px; flex-wrap: wrap; }
  .stat-num {
    font-family: 'Fraunces', serif; font-size: 36px; font-weight: 600;
    color: var(--accent); letter-spacing: -0.02em; line-height: 1;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-top: 8px;
  }

  .hero-bg-grid {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
    background-image:
      linear-gradient(to right, var(--rule-soft) 1px, transparent 1px),
      linear-gradient(to bottom, var(--rule-soft) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at top right, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at top right, black 20%, transparent 70%);
  }

  .dashboard {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  .dashboard::before {
    content: ''; position: absolute; inset: -1px;
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.18), rgba(20, 184, 166, 0.08), transparent 60%);
    pointer-events: none; z-index: -1;
  }
  .dash-head {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 16px; border-bottom: 1px solid var(--rule-soft); margin-bottom: 20px;
  }
  .dash-title { font-size: 13px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 10px; }
  .dash-title-dot { width: 8px; height: 8px; background: var(--teal); border-radius: 50%; box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.18); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.18); }
    50% { box-shadow: 0 0 0 8px rgba(20, 184, 166, 0.05); }
  }
  .dash-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase; }

  .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .kpi {
    padding: 14px; border-radius: 10px; background: var(--paper); border: 1px solid var(--rule-soft);
    transition: all 200ms ease;
  }
  .kpi:hover { border-color: var(--accent); transform: translateY(-2px); }
  .kpi-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase; margin-bottom: 6px; }
  .kpi-value { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--ink); letter-spacing: -0.02em; }
  .kpi-delta { font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-top: 4px; }
  .kpi-delta.up { color: var(--green); }
  .kpi-delta.down { color: var(--rose); }

  .chart-area { height: 150px; position: relative; margin-bottom: 16px; }
  .chart-svg { width: 100%; height: 100%; overflow: visible; }
  .chart-grid line { stroke: var(--rule-soft); stroke-dasharray: 2 4; }
  .chart-axis text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: var(--ink-faint); }

  .legend { display: flex; gap: 16px; padding-top: 12px; border-top: 1px solid var(--rule-soft); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-soft); }
  .legend-dot { width: 8px; height: 2px; border-radius: 1px; }

  .about-grid {
    display: grid; grid-template-columns: 320px 1fr; gap: 64px; align-items: start;
  }
  @media (max-width: 880px) {
    .about-grid { grid-template-columns: 1fr; gap: 32px; }
  }
  .about-photo {
    position: relative; aspect-ratio: 3/4; border-radius: var(--radius-lg);
    overflow: hidden; background: var(--rule-soft);
    box-shadow: var(--shadow-lg);
  }
  .about-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .about-photo::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(11, 18, 32, 0.15));
    pointer-events: none;
  }
  .about-photo-tag {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(255, 255, 255, 0.95); padding: 8px 12px;
    border-radius: 6px; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; color: var(--accent);
    text-transform: uppercase; backdrop-filter: blur(8px);
  }

  .about-heading {
    font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600;
    line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 24px;
  }
  .about-heading em { font-style: italic; color: var(--accent); }
  .about-bio { font-size: 16px; color: var(--ink-soft); line-height: 1.75; margin-bottom: 16px; }
  .about-bio strong { color: var(--ink); font-weight: 600; }

  .skills-block { margin-top: 32px; }
  .skills-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px;
  }
  .skills-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .tag {
    padding: 5px 11px; border-radius: 6px; font-size: 12.5px; font-weight: 500;
    transition: all 180ms ease; cursor: default;
  }
  .tag:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .tag-blue   { background: var(--indigo-pale); color: var(--indigo); }
  .tag-teal   { background: var(--teal-pale); color: var(--accent-warm); }
  .tag-amber  { background: var(--amber-pale); color: var(--amber); }
  .tag-rose   { background: var(--rose-pale); color: var(--rose); }
  .tag-green  { background: var(--green-pale); color: var(--green); }
  .tag-grey   { background: #F1F5F9; color: var(--ink-soft); }

  .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
  .filter-btn {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
    background: var(--card); border: 1px solid var(--rule); color: var(--ink-soft);
    transition: all 180ms ease;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  .work-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
  }
  @media (max-width: 980px) { .work-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .work-grid { grid-template-columns: 1fr; } }

  .work-card {
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius);
    overflow: hidden; transition: all 280ms cubic-bezier(.2,.8,.2,1);
    cursor: pointer; position: relative; display: block;
  }
  .work-card:hover {
    transform: translateY(-4px); border-color: var(--accent);
    box-shadow: var(--shadow-lg);
  }
  .work-thumb {
    aspect-ratio: 16/10; width: 100%; position: relative; overflow: hidden;
    background: var(--paper);
  }
  .work-thumb svg { width: 100%; height: 100%; display: block; transition: transform 600ms ease; }
  .work-card:hover .work-thumb svg { transform: scale(1.04); }
  .work-thumb::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(11, 18, 32, 0.06));
    pointer-events: none;
  }
  .work-tag {
    position: absolute; top: 14px; left: 14px;
    padding: 4px 10px; border-radius: 6px; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    background: rgba(255, 255, 255, 0.95); color: var(--ink); font-weight: 500;
    backdrop-filter: blur(6px);
  }

  .work-body { padding: 22px; }
  .work-meta {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
    color: var(--accent); text-transform: uppercase;
  }
  .work-year { color: var(--ink-faint); }
  .work-title {
    font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; line-height: 1.3;
    color: var(--ink); margin-bottom: 8px; letter-spacing: -0.01em;
  }
  .work-desc { font-size: 13.5px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 14px; }
  .work-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .work-tags .pill {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.04em;
    padding: 3px 8px; border-radius: 4px; background: var(--rule-soft); color: var(--ink-soft);
  }

  .work-arrow {
    position: absolute; bottom: 22px; right: 22px;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent); color: white;
    display: grid; place-items: center;
    opacity: 0; transform: translateX(-8px);
    transition: all 280ms cubic-bezier(.2,.8,.2,1);
  }
  .work-card:hover .work-arrow { opacity: 1; transform: translateX(0); }

  .timeline { position: relative; padding-left: 0; }
  .timeline-item {
    display: grid; grid-template-columns: 200px 1fr; gap: 32px;
    padding: 28px 0; border-bottom: 1px solid var(--rule-soft);
    position: relative;
  }
  .timeline-item:last-child { border-bottom: none; }
  @media (max-width: 720px) {
    .timeline-item { grid-template-columns: 1fr; gap: 12px; }
  }
  .timeline-meta { padding-top: 4px; }
  .timeline-period {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent);
    margin-bottom: 6px; font-weight: 500;
  }
  .timeline-company {
    font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: var(--ink);
    line-height: 1.3;
  }
  .timeline-card {
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius);
    padding: 24px 28px; position: relative;
    transition: all 320ms cubic-bezier(.2,.8,.2,1);
  }
  .timeline-card::before {
    content: ''; position: absolute; left: -8px; top: 32px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--card); border: 2px solid var(--accent);
    transition: all 320ms cubic-bezier(.2,.8,.2,1);
  }
  @media (max-width: 720px) { .timeline-card::before { display: none; } }
  .timeline-item:hover .timeline-card {
    transform: translateX(6px);
    box-shadow: var(--shadow-lg);
    border-color: var(--accent);
  }
  .timeline-item:hover .timeline-card::before {
    background: var(--accent); transform: scale(1.4);
  }

  .role-tag {
    display: inline-block; padding: 4px 10px; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; font-weight: 500; margin-bottom: 12px;
  }
  .role-tag-blue { background: var(--indigo-pale); color: var(--indigo); }
  .role-tag-teal { background: var(--teal-pale); color: var(--accent-warm); }
  .role-tag-amber { background: var(--amber-pale); color: var(--amber); }

  .timeline-role {
    font-family: 'Fraunces', serif; font-size: 21px; font-weight: 600; color: var(--ink);
    margin-bottom: 6px; letter-spacing: -0.01em;
  }
  .timeline-product {
    font-size: 13px; color: var(--ink-soft); margin-bottom: 16px; font-style: italic;
  }
  .timeline-points { list-style: none; padding: 0; }
  .timeline-points li {
    font-size: 14.5px; color: var(--ink-soft); line-height: 1.65;
    padding-left: 18px; position: relative; margin-bottom: 8px;
  }
  .timeline-points li::before {
    content: ''; position: absolute; left: 0; top: 10px;
    width: 6px; height: 1px; background: var(--accent);
  }
  .timeline-points li strong { color: var(--ink); font-weight: 600; }
  .timeline-stack {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--rule-soft);
  }
  .stack-item {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-soft); padding: 3px 8px; border-radius: 4px;
    background: var(--paper); border: 1px solid var(--rule-soft);
  }
  .timeline-metric {
    display: inline-flex; gap: 24px; margin-top: 16px; padding: 14px 18px;
    background: var(--paper); border-radius: 8px; border-left: 3px solid var(--accent);
  }
  .metric-num {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600;
    color: var(--accent); letter-spacing: -0.02em; line-height: 1;
  }
  .metric-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px;
  }

  .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 800px) { .edu-grid { grid-template-columns: 1fr; } }
  .edu-card {
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius);
    padding: 28px; transition: all 280ms ease; position: relative;
  }
  .edu-card:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-2px); }
  .edu-icon {
    width: 44px; height: 44px; border-radius: 10px; margin-bottom: 18px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, var(--indigo-pale), var(--teal-pale));
    color: var(--accent);
  }
  .edu-school {

function DashboardWidget() {
  const t = useT();
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 4000);
    return () => clearInterval(id);
  }, []);

  const data = useMemo(() => {
    const seed = tick;
    const days = 30;
    const points = [];
    for (let i = 0; i < days; i++) {
      const base = 4200 + Math.sin(i / 4) * 380 + i * 22;
      const noise = Math.sin(i * 1.3 + seed * 0.7) * 110 + Math.cos(i * 0.8 + seed) * 80;
      points.push({ x: i, dau: Math.round(base + noise), retention: 38 + Math.sin(i / 5) * 4 + Math.cos(i + seed) * 1.5 });
    }
    return points;
  }, [tick]);

  const W = 460, H = 130, P = { l: 4, r: 4, t: 8, b: 18 };
  const ys = data.map(d => d.dau);
  const yMax = Math.max(...ys) * 1.1;
  const yMin = Math.min(...ys) * 0.9;
  const sx = i => P.l + (i / (data.length - 1)) * (W - P.l - P.r);
  const sy = v => P.t + (1 - (v - yMin) / (yMax - yMin)) * (H - P.t - P.b);

  const areaPath = data.map((d, i) => (i === 0 ? `M ${sx(i)},${sy(d.dau)}` : `L ${sx(i)},${sy(d.dau)}`)).join(' ') +
    ` L ${sx(data.length - 1)},${H - P.b} L ${sx(0)},${H - P.b} Z`;
  const linePath = data.map((d, i) => (i === 0 ? `M ${sx(i)},${sy(d.dau)}` : `L ${sx(i)},${sy(d.dau)}`)).join(' ');

  const lastDau = data[data.length - 1].dau;
  const prevDau = data[data.length - 8].dau;
  const dauDelta = (((lastDau - prevDau) / prevDau) * 100).toFixed(1);

  return (
    <div className="dashboard">
      <div className="dash-head">
        <div className="dash-title">
          <span className="dash-title-dot"></span>
          {t('Live Game · 30D Performance', 'Game đang vận hành · Hiệu suất 30 ngày')}
        </div>
        <div className="dash-meta">v 2.4 · auto-refresh</div>
      </div>

      <div className="kpi-row">
        <div className="kpi">
          <div className="kpi-label">DAU</div>
          <div className="kpi-value mono">{lastDau.toLocaleString()}</div>
          <div className={`kpi-delta ${dauDelta >= 0 ? 'up' : 'down'}`}>
            {dauDelta >= 0 ? '▲' : '▼'} {Math.abs(dauDelta)}% w/w
          </div>
        </div>
        <div className="kpi">
          <div className="kpi-label">D1 Retention</div>
          <div className="kpi-value mono">42.3%</div>
          <div className="kpi-delta up">▲ 1.8 pp</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">ARPDAU</div>
          <div className="kpi-value mono">$0.184</div>
          <div className="kpi-delta up">▲ 3.2%</div>
        </div>
      </div>

      <div className="chart-area">
        <svg className="chart-svg" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#3B82F6" stopOpacity="0.32" />
              <stop offset="100%" stopColor="#3B82F6" stopOpacity="0" />
            </linearGradient>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="#1E40AF" />
              <stop offset="100%" stopColor="#0E7490" />
            </linearGradient>
          </defs>
          <g className="chart-grid">
            {[0.25, 0.5, 0.75].map((p, i) => (
              <line key={i} x1={P.l} x2={W - P.r} y1={P.t + p * (H - P.t - P.b)} y2={P.t + p * (H - P.t - P.b)} />
            ))}
          </g>
          <path d={areaPath} fill="url(#areaGrad)" />
          <path d={linePath} fill="none" stroke="url(#lineGrad)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
          <circle cx={sx(data.length - 1)} cy={sy(lastDau)} r="3.5" fill="#1E40AF" stroke="white" strokeWidth="2" />
        </svg>
      </div>

      <div className="legend">
        <div className="legend-item">
          <span className="legend-dot" style={{background:'#1E40AF', width:14, height:2}}></span>
          <span>Daily Active Users</span>
        </div>
        <div className="legend-item">
          <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--ink-faint)'}}>30 {t('days', 'ngày')}</span>
        </div>
      </div>
    </div>
  );
}

}

function App() {
  const [lang, setLangState] = useState('en');

  useEffect(() => {
    try {
      const saved = window.localStorage.getItem('portfolio-lang');
      if (saved === 'vi' || saved === 'en') setLangState(saved);
    } catch (e) { /* localStorage unavailable */ }
  }, []);

  const setLang = (newLang) => {
    setLangState(newLang);
    try { window.localStorage.setItem('portfolio-lang', newLang); } catch (e) {}
    if (typeof document !== 'undefined') {
      document.documentElement.setAttribute('lang', newLang);
    }
  };

  useEffect(() => {
    if (typeof document !== 'undefined') {
      document.documentElement.setAttribute('lang', lang);
    }
  }, [lang]);

  return (
    <LangContext.Provider value={{ lang, setLang }}>
      <Nav />
      <Hero />
      <About />
      <Work />
      <Experience />
      <Education />
      <Blog />
      <Contact />
      <Footer />
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
